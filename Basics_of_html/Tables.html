<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            /* color: #000000; */
        }
        td , th{
        border: 2px  solid black;
        padding: 10px;
        }
        tr:nth-child(even){
            background-color: #7c7c7c;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Country</th>
            <th>Country code</th>
            <th>email</th>
        </tr>

        </tr>
        <tr>
            <td>United States of America</td>

            <td>USA@google.com</td>
        </tr>
        <tr>
            <td>Japan</td>

            <td>jp@google.com</td>
        </tr>
    </table>

</html>
